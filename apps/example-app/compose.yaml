# Reference compose for CI validation — production files are generated on the VM by `pc ship`.
# Requires platform stack to create network personal-cloud_edge first.

name: example-app

services:
  app:
    image: ghcr.io/your-github-username/example-app:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: example-app
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - edge

networks:
  edge:
    external: true
    name: personal-cloud_edge
