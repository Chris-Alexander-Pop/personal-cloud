when:
  - event: push
    branch: main

steps:
  - name: compose-config-platform
    image: docker:cli
    commands:
      - docker compose -f platform/docker-compose.yml config --quiet

  - name: compose-config-example-app
    image: docker:cli
    commands:
      - |
        export IMAGE_TAG=ci-validate
        docker compose -f apps/example-app/compose.yaml --env-file apps/example-app/.env.example config --quiet
